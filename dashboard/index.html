<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Gestor Esportivo</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Vercel Analytics -->
    <script defer src="/_vercel/insights/script.js"></script>
</head>

<body>

    <!-- ===== Page Content ===== -->
    <div class="app-container" style="display: flex; flex-direction: column; align-items: center; padding: 40px 20px;">
        <div style="max-width: 1200px; width: 100%;">
            <h1 style="color: var(--primary-blue); margin-bottom: 10px;">Dashboard</h1>
            <p style="color: var(--text-muted); margin-bottom: 30px;">Bem-vindo ao sistema de gerenciamento esportivo.
            </p>

            <div class="dashboard-grid"
                style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;">
                <!-- Card: Empresas Cadastradas -->
                <div class="auth-card" style="padding: 25px; display: flex; flex-direction: column; height: 100%;">
                    <div style="display: flex; align-items: center; margin-bottom: 15px;">
                        <div
                            style="width: 40px; height: 40px; border-radius: 8px; background: rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: center; margin-right: 15px; color: var(--primary-blue);">
                            <i class="fa-solid fa-building" style="font-size: 1.2rem;"></i>
                        </div>
                        <h3 style="margin: 0; color: var(--text-color); font-size: 1.1rem; font-weight: 600;">Empresas
                        </h3>
                    </div>
                    <div style="font-size: 2.5rem; font-weight: 800; color: var(--primary-blue); margin-bottom: 15px;">
                        <span id="company-count">...</span>
                    </div>
                    <div style="margin-top: auto; padding-top: 15px; border-top: 1px solid var(--border-color);">
                        <a href="../empresas/index.html"
                            style="color: var(--primary-blue); text-decoration: none; font-weight: 500; font-size: 0.95rem; display: flex; align-items: center; justify-content: space-between;">
                            Ver todas as empresas <i class="fa-solid fa-arrow-right"></i>
                        </a>
                    </div>
                </div>
                <!-- Mais cards podem ser adicionados aqui no futuro -->
            </div>
        </div>
    </div>

    <!-- Shared Header Component -->
    <script src="/js/header.js?v=2" data-root-path="/"></script>
    <script src="/dashboard/dashboard.js?v=2"></script>
</body>

</html>
