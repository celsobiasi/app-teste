<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empresas Cadastradas - Gestor Esportivo</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Vercel Analytics -->
    <script defer src="/_vercel/insights/script.js"></script>

    <style>
        .companies-container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-title {
            color: var(--primary-blue);
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
        }

        .companies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .company-card {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .company-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .company-header {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .company-icon {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-light));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-right: 16px;
            flex-shrink: 0;
        }

        .company-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-color);
            margin: 0 0 4px 0;
            word-break: break-word;
        }

        .company-cnpj {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 0;
        }

        .company-details {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .detail-item {
            display: flex;
            align-items: flex-start;
            font-size: 0.9rem;
            color: var(--text-color);
        }

        .detail-icon {
            color: var(--primary-light);
            margin-right: 10px;
            width: 16px;
            text-align: center;
            margin-top: 3px;
        }

        .detail-text {
            word-break: break-word;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            background: #fff;
            border-radius: 12px;
            border: 1px dashed var(--border-color);
            color: var(--text-muted);
        }

        .empty-icon {
            font-size: 3rem;
            color: var(--border-color);
            margin-bottom: 15px;
        }

        .loader-container {
            grid-column: 1 / -1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px;
            color: var(--primary-blue);
            font-size: 2rem;
        }

        /* Card Actions */
        .card-actions {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            color: var(--text-muted);
            transition: color 0.2s;
            padding: 5px;
        }

        .action-btn.edit:hover {
            color: var(--primary-blue);
        }

        .action-btn.delete:hover {
            color: hsl(0, 84.2%, 60.2%);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transform: scale(0.9);
            transition: transform 0.3s;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
        }

        .btn-danger {
            background: hsl(0, 84.2%, 60.2%);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-danger:hover {
            opacity: 0.9;
        }

        .btn-cancel {
            background: white;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-cancel:hover {
            background: #f8fafc;
        }

        /* Search Bar */
        .search-bar-wrapper {
            margin-bottom: 24px;
        }

        .search-bar {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-bar-icon {
            position: absolute;
            left: 16px;
            color: var(--text-muted);
            font-size: 1rem;
            pointer-events: none;
        }

        #search-input {
            width: 100%;
            padding: 13px 44px 13px 44px;
            border: 1.5px solid var(--border-color);
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            color: var(--text-color);
            background: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        #search-input:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        #search-input::placeholder {
            color: #b0bec5;
        }

        .search-clear {
            position: absolute;
            right: 14px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 0.9rem;
            padding: 4px;
            display: none;
            transition: color 0.2s;
        }

        .search-clear:hover {
            color: var(--text-color);
        }

        .search-results-count {
            margin-top: 8px;
            font-size: 0.82rem;
            color: var(--text-muted);
            min-height: 18px;
        }
    </style>
</head>

<body>

    <div class="app-container">
        <div class="companies-container">
            <div class="page-header">
                <h1 class="page-title">Empresas Cadastradas</h1>
            </div>

            <div id="alert-message" class="error-message user-msg hidden" style="margin-bottom: 20px;"></div>

            <!-- Search Bar -->
            <div class="search-bar-wrapper">
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass search-bar-icon"></i>
                    <input type="text" id="search-input" placeholder="Buscar por nome, CNPJ ou responsável..."
                        autocomplete="off">
                    <button class="search-clear" id="search-clear" title="Limpar busca">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
                <p class="search-results-count" id="search-results-count"></p>
            </div>

            <div class="companies-grid" id="companies-grid">
                <div class="loader-container" id="loader">
                    <i class="fa-solid fa-spinner fa-spin"></i>
                </div>
                <!-- Company cards will be injected here -->
            </div>
        </div>
    </div>

    <!-- Delete Modal -->
    <div class="modal-overlay" id="delete-modal">
        <div class="modal-content">
            <h2 style="color: var(--text-color); margin-bottom: 10px;">Excluir Empresa?</h2>
            <p style="color: var(--text-muted); font-size: 0.95rem;">Tem certeza que deseja excluir esta empresa? Esta
                ação não pode ser desfeita e os dados serão perdidos.</p>
            <div class="modal-actions">
                <button class="btn-cancel" id="btn-cancel-delete">Cancelar</button>
                <button class="btn-danger" id="btn-confirm-delete">
                    <span class="btn-text">Excluir</span>
                    <i class="fa-solid fa-spinner fa-spin btn-loader hidden"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Shared Header Component -->
    <script src="../js/header.js" data-root-path="../"></script>
    <script src="../empresas/lista.js"></script>
</body>

</html>
