<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unidades Cadastradas - Gestor Esportivo</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Vercel Analytics -->
    <script defer src="/_vercel/insights/script.js"></script>

    <style>
        .units-container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-title {
            color: var(--primary-blue);
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
        }

        .units-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .unit-card {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .unit-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .unit-header {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .unit-icon {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-light));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-right: 16px;
            flex-shrink: 0;
        }

        .unit-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-color);
            margin: 0 0 4px 0;
            word-break: break-word;
        }

        .unit-details {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .detail-item {
            display: flex;
            align-items: flex-start;
            font-size: 0.9rem;
            color: var(--text-color);
        }

        .detail-icon {
            color: var(--primary-light);
            margin-right: 10px;
            width: 16px;
            text-align: center;
            margin-top: 3px;
        }

        .detail-text {
            word-break: break-word;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            background: #fff;
            border-radius: 12px;
            border: 1px dashed var(--border-color);
            color: var(--text-muted);
        }

        .empty-icon {
            font-size: 3rem;
            color: var(--border-color);
            margin-bottom: 15px;
        }

        .loader-container {
            grid-column: 1 / -1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px;
            color: var(--primary-blue);
            font-size: 2rem;
        }

        /* Card Actions */
        .card-actions {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            color: var(--text-muted);
            transition: color 0.2s;
            padding: 5px;
        }

        .action-btn.edit:hover {
            color: var(--primary-blue);
        }

        .action-btn.delete:hover {
            color: hsl(0, 84.2%, 60.2%);
        }

        /* Search Bar */
        .search-bar-wrapper {
            margin-bottom: 24px;
        }

        .search-bar {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-bar-icon {
            position: absolute;
            left: 16px;
            color: var(--text-muted);
            font-size: 1rem;
            pointer-events: none;
        }

        #search-input {
            width: 100%;
            padding: 13px 44px 13px 44px;
            border: 1.5px solid var(--border-color);
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            color: var(--text-color);
            background: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        #search-input:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        #search-input::placeholder {
            color: #b0bec5;
        }

        .search-clear {
            position: absolute;
            right: 14px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 0.9rem;
            padding: 4px;
            display: none;
            transition: color 0.2s;
        }

        .search-clear:hover {
            color: var(--text-color);
        }

        .search-results-count {
            margin-top: 8px;
            font-size: 0.82rem;
            color: var(--text-muted);
            min-height: 18px;
        }
    </style>
</head>

<body>

    <div class="app-container">
        <div class="units-container">
            <div class="page-header">
                <h1 class="page-title">Unidades Cadastradas</h1>
                <a href="/unidades/cadastro" class="btn-primary" style="width: auto; text-decoration: none;">
                    <i class="fa-solid fa-plus"></i> Nova Unidade
                </a>
            </div>

            <div id="alert-message" class="error-message user-msg hidden" style="margin-bottom: 20px;"></div>

            <!-- Search Bar -->
            <div class="search-bar-wrapper">
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass search-bar-icon"></i>
                    <input type="text" id="search-input" placeholder="Buscar por nome, responsável ou endereço..."
                        autocomplete="off">
                    <button class="search-clear" id="search-clear" title="Limpar busca">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
                <p class="search-results-count" id="search-results-count"></p>
            </div>

            <div class="units-grid" id="units-grid">
                <div class="loader-container" id="loader">
                    <i class="fa-solid fa-spinner fa-spin"></i>
                </div>
                <!-- Unit cards will be injected here -->
            </div>
        </div>
    </div>

    <!-- Shared Header Component -->
    <script src="/js/header.js" data-root-path="/"></script>
    <script src="/unidades/lista.js"></script>
</body>

</html>
